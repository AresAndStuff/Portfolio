name: Deploy Portfolio

on:
  push:
    branches:
      - main  # Falls dein Hauptbranch 'master' heißt, hier anpassen

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      # Prüft, ob eine package.json existiert (für React/SolidJS in der Zukunft)
      - name: Prüfe auf Node.js Projekt
        id: check_node
        run: |
          if [ -f "package.json" ]; then
            echo "is_node=true" >> $GITHUB_OUTPUT
          else
            echo "is_node=false" >> $GITHUB_OUTPUT
          fi

      - name: Node.js einrichten (falls Framework genutzt wird)
        if: steps.check_node.outputs.is_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Abhängigkeiten installieren & Build (für React/SolidJS)
        if: steps.check_node.outputs.is_node == 'true'
        run: |
          npm ci
          npm run build

      - name: Dateien auf Hetzner kopieren
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Kopiert 'dist/' falls es existiert (Vite/React/Solid), sonst das gesamte Repository
          source: ${{ steps.check_node.outputs.is_node == 'true' && 'dist/**' || '**' }}
          target: "/var/www/portfolio"
          strip_components: ${{ steps.check_node.outputs.is_node == 'true' && 1 || 0 }}