name: Deploy Portfolio

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check for Node.js Project
        id: check_node
        run: |
          if [ -f "package.json" ]; then
            echo "is_node=true" >> $GITHUB_OUTPUT
          else
            echo "is_node=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js (v22 for Astro v6)
        if: steps.check_node.outputs.is_node == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies & Build
        if: steps.check_node.outputs.is_node == 'true'
        run: |
          npm ci
          npm run build

      - name: Copy Files to Hetzner
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # FIX: Copy everything including the newly built dist/ folder
          source: "**"
          target: "/var/www/portfolio"

      - name: Update and Restart Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/portfolio
            
            # 1. Stop the running app if it exists
            pm2 stop portfolio || true
            
            # 2. Update production packages on your server cleanly
            npm install --omit=dev
            
            # 3. Start or restart the Astro Node server using PM2
            pm2 start dist/server/entry.mjs --name "portfolio" || pm2 restart portfolio
            
            # 4. Save PM2 state
            pm2 save